      <stop offset="0%" stop-color="#0b0d14"/>
      <stop offset="55%" stop-color="#141824"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8f542"/>
      <stop offset="100%" stop-color="#3de7ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
